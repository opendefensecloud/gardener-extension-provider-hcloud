name: go:release

on:
  push:
    tags: 'v*'
  workflow_dispatch:
  
jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout commit
      uses: actions/checkout@v7.0.0
    - name: Update VERSION file
      run: |-
          echo "${{ github.ref_name }}" > VERSION
    - name: Setup Go
      uses: actions/setup-go@v7.0.0
      with:
        go-version-file: go.mod
    - name: Create controller-registration.yaml
      run: |-
        # Populate the module cache before make: the Makefile resolves
        # GARDENER_HACK_DIR and GARDENER_TOOL_DIR via `go list -m -f {{.Dir}}`
        # at parse time, which returns empty for modules that are not extracted.
        go mod download

        make generate
    - name: Create Release
      uses: softprops/action-gh-release@v3.0.2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        body: |-
          # [gardener-extension-provider-hcloud] ${{ github.ref_name }}
        files: |-
            example/controller-registration.yaml
  go-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
        - name: gardener-extension-provider-hcloud
        - name: gardener-extension-admission-hcloud

    steps:
    - name: Checkout commit
      uses: actions/checkout@v7.0.0
    - name: Update VERSION file
      run: |-
          echo "${{ github.ref_name }}" > VERSION
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4.2.0
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4.4.0
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Publish image
      uses: docker/build-push-action@v7.3.0
      with:
        target: ${{ matrix.name }}
        push: true
        tags: |
          ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}:latest
          ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}:${{ github.ref_name }}
