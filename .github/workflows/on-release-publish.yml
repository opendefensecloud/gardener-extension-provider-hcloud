name: go:release

on:
  push:
    tags: 'v*'
  workflow_dispatch:
  
jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout commit
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
    - name: Update VERSION file
      run: |-
          echo "${{ github.ref_name }}" > VERSION
    - name: Setup Go
      uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
      with:
        go-version-file: go.mod
    - name: Create controller-registration.yaml
      run: |-
        # Populate the module cache before make: the Makefile resolves
        # GARDENER_HACK_DIR and GARDENER_TOOL_DIR via `go list -m -f {{.Dir}}`
        # at parse time, which returns empty for modules that are not extracted.
        go mod download

        make generate
    - name: Create Release
      uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        body: |-
          # [gardener-extension-provider-hcloud] ${{ github.ref_name }}
        files: |-
            example/controller-registration.yaml
  go-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
        - name: gardener-extension-provider-hcloud
        - name: gardener-extension-admission-hcloud

    steps:
    - name: Checkout commit
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
    - name: Update VERSION file
      run: |-
          echo "${{ github.ref_name }}" > VERSION
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
    - name: Login to GitHub Container Registry
      uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Publish image
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      with:
        target: ${{ matrix.name }}
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}:latest
          ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}:${{ github.ref_name }}
