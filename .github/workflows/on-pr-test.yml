name: go:test

on:
  pull_request:
    paths-ignore: 'docs/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: [ "1.26" ]

    steps:
    - name: Checkout commit
      uses: actions/checkout@v7.0.0
    - name: Set up Go ${{ matrix.go-version }}
      uses: actions/setup-go@v7.0.0
      with:
        go-version: ${{ matrix.go-version }}
    - name: Execute build
      run: make install
    - name: Execute tests
      run: make test-cov
