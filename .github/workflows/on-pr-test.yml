name: go:test

on:
  pull_request:
    paths-ignore: 'docs/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: [ "1.26" ]

    steps:
    - name: Checkout commit
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Set up Go ${{ matrix.go-version }}
      uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
      with:
        go-version: ${{ matrix.go-version }}
    - name: Populate module cache
      run: go mod download
    - name: Lint
      run: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2 run ./cmd/... ./pkg/...
    - name: Verify generated files are up to date
      run: |
        # check-generate.sh creates a temporary checkpoint commit, which needs a git identity
        git config --global user.email "ci@opendefensecloud.org"
        git config --global user.name "opendefensecloud CI"
        make check-generate
    - name: Vulnerability scan
      run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
    - name: Execute build
      run: make install
    - name: Execute tests
      run: make test-cov
